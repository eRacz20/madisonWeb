<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">Madison Gordon</a>
  <div>
    <a href="index.html">Home</a>
    <a href="design.html">Graphic Design</a>
    <a href="photography.html">Photography</a>
    <a href="video.html">Video</a>
  </div>
</header>

<h2 class="title">Photography</h2>

<div class="grid" id="photoGrid">

  <!-- LOAD FIRST (FAST) -->
  <img src="Photography/IMG_0325.jpg" loading="lazy" onclick="openImage(this.src)">
  <img src="Photography/IMG_0855.jpg" loading="lazy" onclick="openImage(this.src)">
  <img src="Photography/IMG_0920.jpg" loading="lazy" onclick="openImage(this.src)">

</div>

<!-- LOAD MORE BUTTON -->
<div style="text-align:center; margin-bottom:40px;">
  <button onclick="loadMore()" style="padding:12px 25px; border:none; border-radius:20px; background:#D8A9AD; color:white; font-weight:600; cursor:pointer;">
    Load More
  </button>
</div>

<!-- LIGHTBOX -->
<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImg">
</div>

<script>
function openImage(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

function loadMore() {
  const grid = document.getElementById("photoGrid");

  const images = [
    "Photography/Brian.jpg",
    "Photography/IMG_0060.jpg",
    "Photography/IMG_0100.jpg",
    "Photography/MGordonChoice2.jpg",
    "Photography/MGordonPet.jpg",
    "Photography/purpleFlower.jpg",
    "Photography/GordonMIOW10.jpg",
    "Photography/MGordonFoliage.jpg",
    "Photography/SelfPortrait.png"
  ];

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.loading = "lazy";
    img.onclick = () => openImage(src);
    grid.appendChild(img);
  });

  // remove button after loading
  event.target.remove();
}
</script>

</body>
</html>
