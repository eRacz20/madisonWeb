<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">Madison Gordon</a>
  <div>
    <a href="index.html">Home</a>
    <a href="design.html">Graphic Design</a>
    <a href="photography.html">Photography</a>
    <a href="video.html">Video</a>
  </div>
</header>

<h2 class="title">Photography</h2>

<div class="grid" id="photoGrid">

  <!-- FIRST 6 -->
  <div class="card">
    <picture onclick="openImage('Photography/IMG_0325.webp')">
      <source srcset="Photography/IMG_0325.webp" type="image/webp">
      <img src="Photography/IMG_0325.jpg" loading="lazy">
    </picture>
  </div>

  <div class="card">
    <picture onclick="openImage('Photography/IMG_0855.webp')">
      <source srcset="Photography/IMG_0855.webp" type="image/webp">
      <img src="Photography/IMG_0855.jpg" loading="lazy">
    </picture>
  </div>

  <div class="card">
    <picture onclick="openImage('Photography/IMG_0920.webp')">
      <source srcset="Photography/IMG_0920.webp" type="image/webp">
      <img src="Photography/IMG_0920.jpg" loading="lazy">
    </picture>
  </div>

  <div class="card">
    <picture onclick="openImage('Photography/Brian.webp')">
      <source srcset="Photography/Brian.webp" type="image/webp">
      <img src="Photography/Brian.jpg" loading="lazy">
    </picture>
  </div>

  <div class="card">
    <picture onclick="openImage('Photography/IMG_0060.webp')">
      <source srcset="Photography/IMG_0060.webp" type="image/webp">
      <img src="Photography/IMG_0060.jpg" loading="lazy">
    </picture>
  </div>

  <div class="card">
    <picture onclick="openImage('Photography/IMG_0100.webp')">
      <source srcset="Photography/IMG_0100.webp" type="image/webp">
      <img src="Photography/IMG_0100.jpg" loading="lazy">
    </picture>
  </div>

</div>

<!-- BUTTON -->
<div style="text-align:center; margin-bottom:40px;">
  <button class="load-more-btn" onclick="loadMorePhotos(event)">
    Load More
  </button>
</div>

<!-- MODAL -->
<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImg">
</div>

<script>
function openImage(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

const photoItems = [
  "Photography/MGordonChoice2",
  "Photography/MGordonPet",
  "Photography/purpleFlower",
  "Photography/GordonMIOW10",
  "Photography/MGordonFoliage",
  "Photography/SelfPortrait"
];

let photoIndex = 0;

function loadMorePhotos(event) {
  const grid = document.getElementById("photoGrid");

  for (let i = 0; i < 6; i++) {
    if (photoIndex >= photoItems.length) break;

    const src = photoItems[photoIndex];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <picture onclick="openImage('${src}.webp')">
        <source srcset="${src}.webp" type="image/webp">
        <img src="${src}.jpg" loading="lazy">
      </picture>
    `;

    grid.appendChild(div);
    photoIndex++;
  }

  if (photoIndex >= photoItems.length) {
    event.target.remove();
  }
}
</script>

</body>
</html>
