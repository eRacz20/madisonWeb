<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">Madison Gordon</a>
  <div>
    <a href="index.html">Home</a>
    <a href="design.html">Graphic Design</a>
    <a href="photography.html">Photography</a>
    <a href="video.html">Video</a>
  </div>
</header>

<h2 class="title">Photography</h2>

<div class="grid" id="photoGrid">

  <picture onclick="openImage('Photography/IMG_0325.webp')">
    <source srcset="Photography/IMG_0325.webp" type="image/webp">
    <img src="Photography/IMG_0325.jpg" loading="lazy">
  </picture>

  <picture onclick="openImage('Photography/IMG_0855.webp')">
    <source srcset="Photography/IMG_0855.webp" type="image/webp">
    <img src="Photography/IMG_0855.jpg" loading="lazy">
  </picture>

  <picture onclick="openImage('Photography/IMG_0920.webp')">
    <source srcset="Photography/IMG_0920.webp" type="image/webp">
    <img src="Photography/IMG_0920.jpg" loading="lazy">
  </picture>

</div>

<div style="text-align:center; margin-bottom:40px;">
  <button onclick="loadMore()" style="padding:12px 25px; border:none; border-radius:20px; background:#D8A9AD; color:white; font-weight:600; cursor:pointer;">
    Load More
  </button>
</div>

<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImg">
</div>

<script>
function openImage(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

function loadMore() {
  const grid = document.getElementById("photoGrid");

  const images = [
    "Photography/Brian",
    "Photography/IMG_0060",
    "Photography/IMG_0100",
    "Photography/MGordonChoice2",
    "Photography/MGordonPet",
    "Photography/purpleFlower",
    "Photography/GordonMIOW10",
    "Photography/MGordonFoliage",
    "Photography/SelfPortrait"
  ];

  images.forEach(src => {
    const pic = document.createElement("picture");

    pic.innerHTML = `
      <source srcset="${src}.webp" type="image/webp">
      <img src="${src}.jpg" loading="lazy">
    `;

    pic.onclick = () => openImage(`${src}.webp`);
    grid.appendChild(pic);
  });

  event.target.remove();
}
</script>

</body>
</html>
