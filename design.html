<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">Madison Gordon</a>
  <div>
    <a href="index.html">Home</a>
    <a href="design.html">Graphic Design</a>
    <a href="photography.html">Photography</a>
    <a href="video.html">Video</a>
  </div>
</header>

<h2 class="title">Graphic Design</h2>

<div class="grid" id="designGrid">

  <!-- FIRST 6 -->
  <div class="card">
    <picture onclick="openImage('Graphic Design/Gordon-Media-Mashup-Program-Mockup.webp')">
      <source srcset="Graphic Design/Gordon-Media-Mashup-Program-Mockup.webp" type="image/webp">
      <img src="Graphic Design/Gordon-Media-Mashup-Program-Mockup.jpg" loading="lazy">
    </picture>
    <h3>Media Mashup Program</h3>
  </div>

  <div class="card">
    <picture onclick="openImage('Graphic Design/Mashup-Poster.webp')">
      <source srcset="Graphic Design/Mashup-Poster.webp" type="image/webp">
      <img src="Graphic Design/Mashup-Poster.jpg" loading="lazy">
    </picture>
    <h3>Mashup Poster</h3>
  </div>

  <div class="card">
    <picture onclick="openImage('Graphic Design/Tshirt-resized.webp')">
      <source srcset="Graphic Design/Tshirt-resized.webp" type="image/webp">
      <img src="Graphic Design/Tshirt-resized.jpg" loading="lazy">
    </picture>
    <h3>T-Shirt Design</h3>
  </div>

  <div class="card">
    <picture onclick="openImage('Graphic Design/Gordon-Desktop-Surf-Ad.webp')">
      <source srcset="Graphic Design/Gordon-Desktop-Surf-Ad.webp" type="image/webp">
      <img src="Graphic Design/Gordon-Desktop-Surf-Ad.jpg" loading="lazy">
    </picture>
    <h3>Surf Desktop Ad</h3>
  </div>

  <div class="card">
    <picture onclick="openImage('Graphic Design/Gordon-Iphone-Sunglasses-Ad.webp')">
      <source srcset="Graphic Design/Gordon-Iphone-Sunglasses-Ad.webp" type="image/webp">
      <img src="Graphic Design/Gordon-Iphone-Sunglasses-Ad.jpg" loading="lazy">
    </picture>
    <h3>Sunglasses Mobile Ad</h3>
  </div>

  <div class="card">
    <picture onclick="openImage('Graphic Design/Madison-Gordon-Ashley-Furniture-Phone-Hand-Meta-Ad.webp')">
      <source srcset="Graphic Design/Madison-Gordon-Ashley-Furniture-Phone-Hand-Meta-Ad.webp" type="image/webp">
      <img src="Graphic Design/Madison-Gordon-Ashley-Furniture-Phone-Hand-Meta-Ad.jpg" loading="lazy">
    </picture>
    <h3>Furniture Meta Ad</h3>
  </div>

</div>

<!-- BUTTON -->
<div style="text-align:center; margin-bottom:40px;">
  <button class="load-more-btn" onclick="loadMoreDesign(event)">
    Load More
  </button>
</div>

<!-- MODAL -->
<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImg">
</div>

<script>
function openImage(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

const designItems = [
  {img: "Phone-Hand-Meta-Ad-2024", title: "Mobile Meta Ad"},
  {img: "Gordon-ENews-Business-Card-Mockup", title: "Business Card"},
  {img: "Gordon-Movie-Poster-Mockup", title: "Movie Poster"},
  {img: "Long-Beach-poster", title: "Long Beach Poster"},
  {img: "Madison-Gordon-Bookcover-Project_p1(pdfgear.com)", title: "Book Cover"},
  {img: "Gordon-Nurse-Event-Flyer", title: "Nurse Flyer"},

  /* NEW IMAGES FIXED */
  {img: "StationeryMockup", title: "Stationery Mockup"},
  {img: "PodcastLogoWork", title: "Podcast Logo"},
  {img: "MagazineAD", title: "Magazine Ad"}
];

let currentIndex = 0;

function loadMoreDesign(event) {
  const grid = document.getElementById("designGrid");

  for (let i = 0; i < 6; i++) {
    if (currentIndex >= designItems.length) break;

    const item = designItems[currentIndex];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <picture onclick="openImage('Graphic Design/${item.img}.webp')">
        <source srcset="Graphic Design/${item.img}.webp" type="image/webp">
        <img src="Graphic Design/${item.img}.webp" loading="lazy">
      </picture>
      <h3>${item.title}</h3>
    `;

    grid.appendChild(div);
    currentIndex++;
  }

  if (currentIndex >= designItems.length) {
    event.target.remove();
  }
}
</script>

</body>
</html>
